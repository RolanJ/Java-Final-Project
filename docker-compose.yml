services:
  db:
    image: postgres:15-alpine
    container_name: jumagulovrolanpostgresdb
    environment:
      POSTGRES_DB: javafinalproject
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123els123"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  app:
    build: .
    container_name: jumagulovrolanapp
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/javafinalproject
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: "123els123"
